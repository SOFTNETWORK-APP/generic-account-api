notification {
  push {
    clientId = "auth"
    clientId = ${?AUTH_PUSH_CLIENT_ID}
    client-id = ${notification.push.clientId}
  }

  sms {
    clientId = "auth"
    clientId = ${?AUTH_SMS_CLIENT_ID}
    client-id = ${notification.sms.clientId}
    name = "nobody"
    name = ${?NOTIFICATION_SMS_NAME}
  }

}

auth {
  baseUrl = "http://localhost/api"
  baseUrl = ${?AUTH_BASE_URL}
  base-url = ${auth.baseUrl}

  realm = "Realm"

  resetPasswordUrl = "http://localhost/reset_password.html"
  resetPasswordUrl = ${?AUTH_RESET_PASSWORD_URL}
  reset-password-url = ${auth.resetPasswordUrl}

  # Activation link emitted in the account-activation email. `{token}` is replaced with the
  # activation token. Default reproduces the historical `${baseUrl}/${path}/activate/<token>`
  # (backend, path-style). Override (e.g. AUTH_ACTIVATION_URL=https://app.example.com/activate?token={token})
  # for SPA frontends that expect a query-style token on a dedicated activation route.
  activationUrl = ${auth.baseUrl}"/"${auth.path}"/activate/{token}"
  activationUrl = ${?AUTH_ACTIVATION_URL}
  activation-url = ${auth.activationUrl}

  regenerationOfThePasswordResetToken = true
  regeneration-of-the-password-reset-token = ${auth.regenerationOfThePasswordResetToken}

  akka-node-role = accounts

  activation {
    enabled = true
    enabled = ${?AUTH_ACTIVATION_ENABLED}
    token {
      expirationTime = 1440
      expirationTime = ${?AUTH_ACTIVATION_TOKEN_EXPIRATION_TIME}
      expiration-time = ${auth.activation.token.expirationTime}
    }
  }

  verification{
    code {
      size           = 6
      expirationTime = 5

      size           = ${?AUTH_VERIFICATION_CODE_SIZE}
      expirationTime = ${?AUTH_VERIFICATION_CODE_EXPIRATION_TIME}
      expiration-time = ${auth.verification.code.expirationTime}
    }
    token {
      expirationTime = 10
      expirationTime = ${?AUTH_VERIFICATION_TOKEN_EXPIRATION_TIME}
      expiration-time = ${auth.verification.token.expirationTime}
    }
    gsm {
      enabled = true
      enabled = ${?AUTH_VERIFICATION_GSM_ENABLED}
    }
    email {
      enabled = true
      enabled = ${?AUTH_VERIFICATION_EMAIL_ENABLED}
    }
  }

  password {
    whitespace{
    }
    length{
      min = 8
    }
    upperCaseCharacter{
      size = 1
    }
    upper-case-character = ${auth.password.upperCaseCharacter}
    lowerCaseCharacter{
      size = 1
    }
    lower-case-character = ${auth.password.lowerCaseCharacter}
    numberCharacter{
      size = 1
    }
    number-character = ${auth.password.numberCharacter}
  }

  anonymous {
    password = "ChangeIt1!"
  }

  maxLoginFailures = 4
  max-login-failures = ${auth.maxLoginFailures}

  notifications {
    activation = "Activation"
    registration = "Registration"
    account-disabled = "Account disabled"
    reset-password = "Reset pasword"
    password-updated = "Password updated"
    principal-updated = "Principal updated"
    reset-password-code = true
    channels {
      activation = ["MAIL_TYPE", "PUSH_TYPE", "SMS_TYPE"]
      registration = ["MAIL_TYPE", "PUSH_TYPE", "SMS_TYPE"]
      account-disabled = ["MAIL_TYPE", "PUSH_TYPE", "SMS_TYPE"]
      reset-password = ["MAIL_TYPE", "PUSH_TYPE", "SMS_TYPE"]
      password-updated = ["MAIL_TYPE", "PUSH_TYPE", "SMS_TYPE"]
      principal-updated = ["MAIL_TYPE", "PUSH_TYPE", "SMS_TYPE"]
    }
    signature = "Best regards,"
  }

  admin {
    root {
      login = "root"
      login = ${?AUTH_ROOT_LOGIN}

      password = "Changeit1"
      password = ${?AUTH_ROOT_PASSWORD}
    }
  }

  path = "account"
  path = ${?AUTH_PATH}

  oauth {
    path = "oauth"
    path = ${?AUTH_OAUTH_PATH}

    callback {
      # Frontend URL the social-login callback redirects to once the session is
      # established; a status=success|error query param is appended.
      redirect-url = "http://localhost/oauth/callback"
      redirect-url = ${?AUTH_OAUTH_CALLBACK_REDIRECT_URL}
    }

    authorization-code {
      expirationTime = 5
      expirationTime = ${?AUTH_AUTHORIZATION_CODE_EXPIRATION_TIME}
      expiration-time = ${auth.oauth.authorization-code.expirationTime}
    }

    access-token {
      expirationTime = 30
      expirationTime = ${?AUTH_ACCESS_TOKEN_EXPIRATION_TIME}
      expiration-time = ${auth.oauth.access-token.expirationTime}
    }

    refresh-token {
      expirationTime = 525600 // 60 * 24 * 365
      expirationTime = ${?AUTH_REFRESH_TOKEN_EXPIRATION_TIME}
      expiration-time = ${auth.oauth.refresh-token.expirationTime}
    }

    providers {

      facebook {
        client-id = null
        client-id = ${?AUTH_OAUTH_FACEBOOK_CLIENT_ID}

        client-secret = null
        client-secret = ${?AUTH_OAUTH_FACEBOOK_CLIENT_SECRET}
      }

      github {
        client-id = null
        client-id = ${?AUTH_OAUTH_GITHUB_CLIENT_ID}

        client-secret = null
        client-secret = ${?AUTH_OAUTH_GITHUB_CLIENT_SECRET}

        default-scope = "read:user,user:email"
        default-scope = ${?AUTH_OAUTH_GITHUB_DEFAULT_SCOPE}
      }

      google {
        client-id = null
        client-id = ${?AUTH_OAUTH_GOOGLE_CLIENT_ID}

        client-secret = null
        client-secret = ${?AUTH_OAUTH_GOOGLE_CLIENT_SECRET}
      }

      instagram {
        client-id = null
        client-id = ${?AUTH_OAUTH_INSTAGRAM_CLIENT_ID}

        client-secret = null
        client-secret = ${?AUTH_OAUTH_INSTAGRAM_CLIENT_SECRET}
      }

    }
  }
}
